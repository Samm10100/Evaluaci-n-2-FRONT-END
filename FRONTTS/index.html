<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Gatos</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section id="section-login" class="d-flex justify-content-center align-items-center min-vh-100">
    <main class="form-signin">
      <form id="formLogin">
        <div class="form-header"> 
          <img src="img/gatodormido.png" alt="gato dormido">
          <h1 class="h3 mb-3 fw-normal text-white">Iniciar sesión</h1>
        </div>
        
        <div class="form-floating mb-2"> 
          <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required> 
          <label for="loginEmail">Correo electrónico</label> 
        </div>
        
        <div class="form-floating mb-3"> 
          <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
          <label for="loginPassword">Contraseña</label> 
        </div> 
        
        <div class="form-button">
          <button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>  
        </div>
        
        <div class="mt-3">
          <a href="#" id="link-to-register" class="text-white">¿No tienes cuenta? Regístrate aquí</a>
        </div>
      </form>
    </main>
  </section>

  <section id="section-register" class="d-none justify-content-center align-items-center min-vh-100">
    <main class="form-signup"> 
      <form id="formCrearCuenta">
        <div class="form-header"> 
          <img src="img/gatodormido.png" alt="gato dormido"> 
          <h1 class="h3 mb-3 fw-normal text-white">Crear cuenta</h1>
        </div>

        <div class="form-floating mb-2"> 
          <input type="text" class="form-control" id="regNombre" placeholder="Tu nombre" required> 
          <label for="regNombre">Nombre</label> 
        </div>

        <div class="form-floating mb-2"> 
          <input type="text" class="form-control" id="regTelefono" placeholder="Tu numero" required> 
          <label for="regTelefono">Teléfono</label> 
        </div>

        <div class="form-floating mb-2"> 
          <input type="email" class="form-control" id="regEmail" placeholder="name@example.com" required> 
          <label for="regEmail">Correo electrónico</label> 
        </div>

        <div class="form-floating mb-2"> 
          <input type="password" class="form-control" id="regPassword" placeholder="Contraseña" required>
          <label for="regPassword">Contraseña</label> 
        </div>

        <div class="form-floating mb-3"> 
          <input type="password" class="form-control" id="regConfirmPassword" placeholder="Repetir Contraseña" required>
          <label for="regConfirmPassword">Repetir contraseña</label> 
        </div>

        <div class="form-button">
          <button class="btn btn-primary w-100 py-2" type="submit">Registrarse</button> 
        </div>

        <div class="mt-3 text-center">
          <a href="#" id="link-to-login" class="text-white text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
      </form>
    </main>
  </section>

  <section id="section-dashboard" class="d-none mt-5 mb-5">
    <div class="d-flex flex-column align-items-center" id="dashboard-main-content">
      
      <div class="d-flex gap-3 mb-4">
        <button id="actionBtn" class="btn btn-primary btn-lg custom-transition">
          Presióname <span id="btnCounter">15</span>
        </button>
        <button id="removeBtn" class="btn btn-outline-secondary btn-lg bg-white">
          Quitar del carrito
        </button>
      </div>

      <div id="statusCard" class="card text-bg-primary custom-transition shadow" style="width: 20rem;">
        <div id="cardHeader" class="card-header text-center fw-bold text-uppercase border-bottom border-light">
          Fase 1: Gatito descansando...
        </div>
        
        <div class="card-body text-center d-flex flex-column align-items-center">
          <img id="cardImage" src="https://i.pinimg.com/736x/84/a1/e0/84a1e0b276dfc63f5329406da148f514.jpg" class="card-img-custom bg-white mt-2 mb-3 p-1 shadow-sm" alt="Cuadro de Gato">
          <h5 id="cardTitle" class="card-title fw-bold">Cuadro: Gato mimiendo..</h5>
          <p id="cardDesc" class="card-text">Hermosa pintura clásica. Tenemos suficientes unidades disponibles.</p>
        </div>
        
        <div class="card-footer text-center border-top border-light">
          Cuadros disponibles: <span id="footerCounter" class="fw-bold">15</span>
        </div>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
